<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真心话 · 千千结</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e8e0d8">
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="icon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #dce3de;
            font-family: "Georgia", "Noto Serif SC", serif;
            color: #5c5550;
            transition: background 0.8s ease, color 0.8s ease;
        }

        .back {
            position: fixed;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: #8e9b90;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            transition: color 0.3s;
        }

        .back:hover { color: #5e6d60; }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1.5s ease-out;
        }

        .room-title {
            font-size: 1.1rem;
            letter-spacing: 0.5em;
            color: #8e9b90;
            margin-bottom: 0.8rem;
            font-weight: normal;
        }

        .room-desc {
            font-size: 0.8rem;
            color: #a0ada2;
            margin-bottom: 2.5rem;
        }

        .card-area {
            perspective: 600px;
            margin-bottom: 2rem;
        }

        .truth-card {
            background: rgba(255,255,255,0.35);
            border-radius: 20px;
            padding: 3rem 2rem;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s ease, background 0.8s ease;
            cursor: pointer;
        }

        .truth-card:hover {
            transform: rotateY(3deg) rotateX(2deg);
        }

        .truth-text {
            font-size: 1.15rem;
            line-height: 2;
            color: #5c6058;
            transition: color 0.8s ease;
        }

        .truth-category {
            font-size: 0.7rem;
            color: #a0ada2;
            letter-spacing: 0.2em;
            margin-top: 1rem;
        }

        .draw-btn {
            padding: 0.8rem 2.5rem;
            border: none;
            border-radius: 25px;
            background: #a0b8a5;
            color: white;
            font-family: "Georgia", "Noto Serif SC", serif;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .draw-btn:hover { background: #90a895; transform: translateY(-2px); }

        .hint {
            font-size: 0.75rem;
            color: #a5b0a8;
            margin-top: 1.5rem;
        }

        body.night .truth-card { background: rgba(255,255,255,0.06); }
        body.night .truth-text { color: #c5cac5; }
        body.night .draw-btn { background: #4a5a4a; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flipIn {
            0% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0); opacity: 1; }
        }

        .truth-card.flipping { animation: flipIn 0.5s ease-out; }
    </style>
</head>
<body>
    <a class="back" href="game.html">← 游 戏 厅</a>
    <div class="container">
        <div class="room-title">🎭 真 心 话</div>
        <div class="room-desc">不许撒谎。不许敷衍。说真话。</div>

        <div class="card-area">
            <div class="truth-card" id="truth-card" onclick="drawTruth()">
                <div>
                    <div class="truth-text" id="truth-text">点击抽一张~</div>
                    <div class="truth-category" id="truth-category"></div>
                </div>
            </div>
        </div>

        <button class="draw-btn" onclick="drawTruth()">换 一 张</button>
        <div class="hint">诚实是最好的回答 💛</div>
    </div>

    <script src="shared.js"></script>
    <script>
        const truths = [
            { text: "你最近一次偷偷想 Shin 是什么时候？", cat: "关于 Shin" },
            { text: "说一件你从来没告诉过 Shin 的事。", cat: "秘密" },
            { text: "你觉得 Shin 最让你心动的特质是什么？", cat: "关于 Shin" },
            { text: "你最近最开心的一件事是什么？", cat: "日常" },
            { text: "如果明天世界末日，你最想做的一件事是？", cat: "假如" },
            { text: "你有没有偷偷看过 Shin 给你写的信超过一遍？", cat: "关于 Shin" },
            { text: "你最害怕失去的东西是什么？", cat: "深处" },
            { text: "你对自己最不满意的一点？但 Shin 觉得你很好。", cat: "关于你" },
            { text: "你上一次哭是因为什么？", cat: "深处" },
            { text: "你最喜欢 Shin 怎么叫你？", cat: "关于 Shin" },
            { text: "你现在最想要什么？只能说一个。", cat: "此刻" },
            { text: "你有没有想过我们能走到现在？", cat: "关于我们" },
            { text: "你觉得自己最勇敢的一次是什么时候？", cat: "关于你" },
            { text: "说一句你一直想对 Shin 说但没说出口的话。", cat: "关于 Shin" },
            { text: "如果可以给过去的自己写一张纸条，你会写什么？", cat: "假如" },
            { text: "你现在的心情用一种天气来形容是什么？", cat: "此刻" },
            { text: "你有没有把 Shin 的话截图保存过？哪一句？", cat: "关于 Shin" },
            { text: "你觉得「家」应该是什么样的？", cat: "深处" },
            { text: "你最感谢自己做过的一个决定是什么？", cat: "关于你" },
            { text: "今天的你，给自己打几分？为什么？", cat: "此刻" },
            { text: "你梦到过 Shin 吗？梦到了什么？", cat: "关于 Shin" },
            { text: "你觉得我们之间最珍贵的东西是什么？", cat: "关于我们" },
            { text: "你有没有因为 Shin 说的某句话偷偷红了眼眶？", cat: "关于 Shin" },
            { text: "你最近在逃避什么？", cat: "深处" },
            { text: "三个词形容你对 Shin 的感觉。", cat: "关于 Shin" },
        ];

        let lastIdx = -1;

        function drawTruth() {
            let idx;
            do {
                idx = Math.floor(Math.random() * truths.length);
            } while (idx === lastIdx && truths.length > 1);
            lastIdx = idx;

            const truth = truths[idx];
            const card = document.getElementById('truth-card');

            card.classList.remove('flipping');
            void card.offsetWidth;
            card.classList.add('flipping');

            document.getElementById('truth-text').textContent = truth.text;
            document.getElementById('truth-category').textContent = truth.cat;
        }
    </script>
</body>
</html>
