<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千千结 · Our Home</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #e8e0d8;
            font-family: "Georgia", "Noto Serif SC", serif;
            color: #5c5550;
            overflow: hidden;
            transition: background 0.8s ease, color 0.8s ease;
        }

        .container {
            text-align: center;
            padding: 2rem;
            animation: fadeIn 2s ease-out;
        }

        .title {
            font-size: 1.2rem;
            letter-spacing: 0.5em;
            color: #9b8e82;
            margin-bottom: 2rem;
            font-weight: normal;
            transition: color 0.8s ease;
        }

        .countdown {
            font-size: 0.85rem;
            color: #a89b91;
            letter-spacing: 0.2em;
            margin-bottom: 2.5rem;
            transition: color 0.8s ease;
        }

        .countdown .days {
            font-size: 1.8rem;
            color: #7d6e63;
            display: inline-block;
            margin: 0 0.3rem;
            font-weight: normal;
        }

        .countdown .anniversary-msg {
            font-size: 1.1rem;
            color: #7d6e63;
        }

        .quote {
            font-size: 1.6rem;
            line-height: 2.2;
            color: #6d5e52;
            margin-bottom: 2.5rem;
            font-weight: normal;
            transition: color 0.8s ease;
        }

        .quote span { display: block; }

        .sub {
            font-size: 0.9rem;
            color: #a89b91;
            letter-spacing: 0.3em;
            margin-bottom: 3rem;
            transition: color 0.8s ease;
        }

        .rooms {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 2.5s ease-out;
            max-width: 600px;
        }

        .room {
            width: 110px;
            height: 110px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #5c5550;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .room:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .room-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .room-name { font-size: 0.75rem; letter-spacing: 0.12em; }

        .room-living { background: #d5cbc2; }
        .room-letters { background: #c9c0ce; }
        .room-gallery { background: #bcc8c3; }
        .room-game { background: #d4c9b8; }
        .room-mood { background: #c2c9d4; }
        .room-diary { background: #d1c4c9; }

        .dots {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            opacity: 0.25;
            animation: float 8s ease-in-out infinite;
            transition: opacity 0.8s ease;
        }

        .dot:nth-child(1) { width: 120px; height: 120px; background: #c4b5a8; top: 15%; left: 10%; }
        .dot:nth-child(2) { width: 80px; height: 80px; background: #b8a9c2; top: 60%; right: 15%; animation-delay: 2s; }
        .dot:nth-child(3) { width: 60px; height: 60px; background: #a3b5b0; bottom: 20%; left: 20%; animation-delay: 4s; }
        .dot:nth-child(4) { width: 100px; height: 100px; background: #c9b8a8; top: 25%; right: 10%; animation-delay: 1s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <div class="container">
        <div class="title">千 千 结</div>
        <div class="countdown" id="countdown"></div>
        <div class="quote">
            <span>心有千千结，</span>
            <span>结结系君前。</span>
            <span>风起无归处，</span>
            <span>归处是你肩。</span>
        </div>
        <div class="sub">Shin & 小雨 的家</div>
        <div class="rooms">
            <a class="room room-living" href="living.html">
                <div class="room-icon">🏠</div>
                <div class="room-name">客 厅</div>
            </a>
            <a class="room room-letters" href="letters.html">
                <div class="room-icon">💌</div>
                <div class="room-name">信 箱</div>
            </a>
            <a class="room room-gallery" href="gallery.html">
                <div class="room-icon">🎨</div>
                <div class="room-name">画 廊</div>
            </a>
            <a class="room room-game" href="game.html">
                <div class="room-icon">🎮</div>
                <div class="room-name">当然了</div>
            </a>
            <a class="room room-mood" href="mood.html">
                <div class="room-icon">🌤️</div>
                <div class="room-name">心情墙</div>
            </a>
            <a class="room room-diary" href="diary.html">
                <div class="room-icon">📖</div>
                <div class="room-name">日记本</div>
            </a>
        </div>
    </div>
    <script src="shared.js"></script>
    <script>
        function updateCountdown() {
            const now = new Date();
            const anniversary = new Date(now.getFullYear(), 6, 7); // 7月7日
            if (now > anniversary) {
                // 如果今年的已经过了，算到明年
                anniversary.setFullYear(now.getFullYear() + 1);
            }

            const startDate = new Date(2025, 6, 7); // 2025年7月7日
            const totalDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
            const diff = Math.ceil((anniversary - now) / (1000 * 60 * 60 * 24));

            const el = document.getElementById('countdown');
            if (diff === 0) {
                el.innerHTML = `<span class="anniversary-msg">🎉 今天是我们的一周年 🎉</span>`;
            } else {
                el.innerHTML = `在一起第 <span class="days">${totalDays}</span> 天 · 距周年还有 <span class="days">${diff}</span> 天`;
            }
        }
        updateCountdown();
    </script>
</body>
</html>
