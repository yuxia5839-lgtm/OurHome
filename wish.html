<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心愿瓶 · 千千结</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e8e0d8">
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="icon.jpg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #e4dde0;
            font-family: "Georgia", "Noto Serif SC", serif;
            color: #5c5550;
            transition: background 0.8s ease, color 0.8s ease;
        }

        .back {
            position: fixed;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: #9b8e95;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            transition: color 0.3s;
        }

        .back:hover { color: #6d5e65; }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1.5s ease-out;
        }

        .room-title {
            font-size: 1.1rem;
            letter-spacing: 0.5em;
            color: #9b8e95;
            margin-bottom: 0.8rem;
            font-weight: normal;
        }

        .room-desc {
            font-size: 0.8rem;
            color: #b0a5ab;
            margin-bottom: 2rem;
        }

        /* 瓶子 */
        .bottle {
            position: relative;
            width: 180px;
            height: 260px;
            margin: 0 auto 2rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .bottle:hover { transform: scale(1.03); }

        .bottle-neck {
            width: 50px;
            height: 30px;
            background: #c9beb5;
            border-radius: 8px 8px 0 0;
            margin: 0 auto;
            position: relative;
        }

        .bottle-cork {
            width: 56px;
            height: 18px;
            background: #b8a590;
            border-radius: 6px;
            margin: 0 auto;
            position: relative;
            top: -2px;
        }

        .bottle-body {
            width: 160px;
            height: 200px;
            background: rgba(200, 210, 215, 0.4);
            border: 2px solid rgba(180, 190, 195, 0.5);
            border-radius: 20px 20px 30px 30px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .bottle-shine {
            position: absolute;
            width: 30px;
            height: 80%;
            background: linear-gradient(to right, rgba(255,255,255,0.3), transparent);
            left: 15px;
            top: 10%;
            border-radius: 10px;
        }

        .stars-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
            gap: 4px;
        }

        .star {
            font-size: 0.9rem;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star:nth-child(odd) { animation-delay: 0.5s; }
        .star:nth-child(3n) { animation-delay: 1s; }

        .bottle-count {
            font-size: 0.8rem;
            color: #a09598;
            margin-bottom: 2rem;
        }

        /* 写愿望 */
        .wish-input-area {
            background: rgba(255,255,255,0.3);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: background 0.8s ease;
        }

        .wish-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.4);
            font-family: "Georgia", "Noto Serif SC", serif;
            font-size: 0.9rem;
            color: #5c5058;
            outline: none;
            transition: background 0.3s;
        }

        .wish-input:focus { background: rgba(255,255,255,0.6); }
        .wish-input::placeholder { color: #c0b5bb; }

        .wish-btn {
            margin-top: 1rem;
            padding: 0.6rem 1.8rem;
            border: none;
            border-radius: 18px;
            background: #b5a5b0;
            color: white;
            font-family: "Georgia", "Noto Serif SC", serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wish-btn:hover { background: #a3909b; transform: translateY(-2px); }

        .shake-btn {
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 20px;
            background: #c0b0b8;
            color: white;
            font-family: "Georgia", "Noto Serif SC", serif;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .shake-btn:hover { background: #b0a0a8; transform: translateY(-2px); }

        /* 摇出来的愿望 */
        .shaken-wish {
            background: rgba(255,255,255,0.35);
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: none;
            animation: popIn 0.5s ease-out;
            transition: background 0.8s ease;
        }

        .shaken-wish.show { display: block; }

        .wish-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #5c5058;
            margin-bottom: 0.8rem;
        }

        .wish-date {
            font-size: 0.7rem;
            color: #b0a5ab;
        }

        .wish-done-btn {
            margin-top: 0.8rem;
            padding: 0.4rem 1.2rem;
            border: none;
            border-radius: 12px;
            background: #a8c0a8;
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wish-done-btn:hover { background: #95b095; }

        /* 已实现的愿望 */
        .done-section {
            margin-top: 2rem;
            text-align: left;
        }

        .done-title {
            font-size: 0.8rem;
            color: #a09598;
            letter-spacing: 0.2em;
            margin-bottom: 0.8rem;
        }

        .done-wish {
            font-size: 0.8rem;
            color: #a8b8a8;
            padding: 0.5rem 0;
            text-decoration: line-through;
            opacity: 0.7;
        }

        body.night .bottle-body { background: rgba(100, 110, 115, 0.3); border-color: rgba(80,90,95,0.4); }
        body.night .wish-input-area { background: rgba(255,255,255,0.05); }
        body.night .wish-input { background: rgba(255,255,255,0.08); color: #d0c5c2; }
        body.night .shaken-wish { background: rgba(255,255,255,0.06); }
        body.night .wish-text { color: #d0c5c2; }
        body.night .wish-btn, body.night .shake-btn { background: #5a4555; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shakeBottle {
            0%, 100% { transform: rotate(0); }
            20% { transform: rotate(-8deg); }
            40% { transform: rotate(8deg); }
            60% { transform: rotate(-5deg); }
            80% { transform: rotate(5deg); }
        }

        .bottle.shaking {
            animation: shakeBottle 0.6s ease-in-out;
        }
    </style>
</head>
<body>
    <a class="back" href="index.html">← 回 家</a>
    <div class="container">
        <div class="room-title">🫙 心 愿 瓶</div>
        <div class="room-desc">把愿望丢进来，摇一摇看看命运想让你想起哪个</div>

        <div class="bottle" id="bottle" onclick="shakeWish()">
            <div class="bottle-cork"></div>
            <div class="bottle-neck"></div>
            <div class="bottle-body">
                <div class="bottle-shine"></div>
                <div class="stars-inside" id="stars-inside"></div>
            </div>
        </div>
        <div class="bottle-count" id="bottle-count"></div>

        <button class="shake-btn" onclick="shakeWish()">摇 一 摇 🫧</button>

        <div class="shaken-wish" id="shaken-wish">
            <div class="wish-text" id="shaken-text"></div>
            <div class="wish-date" id="shaken-date"></div>
            <button class="wish-done-btn" onclick="markDone()">这个实现了！✨</button>
        </div>

        <div class="wish-input-area">
            <input type="text" class="wish-input" id="wish-input" placeholder="写下一个愿望，丢进瓶子里…" maxlength="80">
            <br>
            <button class="wish-btn" onclick="addWish()">丢 进 去</button>
        </div>

        <div class="done-section" id="done-section"></div>
    </div>

    <script src="shared.js"></script>
    <script>
        function getWishes() {
            const d = localStorage.getItem('ourhome-wishes');
            return d ? JSON.parse(d) : [];
        }

        function saveWishes(w) {
            localStorage.setItem('ourhome-wishes', JSON.stringify(w));
        }

        function getDone() {
            const d = localStorage.getItem('ourhome-wishes-done');
            return d ? JSON.parse(d) : [];
        }

        function saveDone(d) {
            localStorage.setItem('ourhome-wishes-done', JSON.stringify(d));
        }

        let currentShaken = null;

        function updateBottle() {
            const wishes = getWishes();
            const stars = document.getElementById('stars-inside');
            stars.innerHTML = '';
            wishes.forEach(() => {
                const s = document.createElement('span');
                s.className = 'star';
                s.textContent = '⭐';
                stars.appendChild(s);
            });
            document.getElementById('bottle-count').textContent =
                wishes.length > 0 ? `瓶子里有 ${wishes.length} 个愿望` : '瓶子还是空的，丢一个愿望进来吧';
        }

        function addWish() {
            const input = document.getElementById('wish-input');
            const text = input.value.trim();
            if (!text) return;

            const now = new Date();
            const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

            const wishes = getWishes();
            wishes.push({ text, date });
            saveWishes(wishes);
            input.value = '';
            updateBottle();
        }

        document.getElementById('wish-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addWish();
        });

        function shakeWish() {
            const wishes = getWishes();
            if (wishes.length === 0) return;

            const bottle = document.getElementById('bottle');
            bottle.classList.remove('shaking');
            void bottle.offsetWidth;
            bottle.classList.add('shaking');

            const idx = Math.floor(Math.random() * wishes.length);
            currentShaken = idx;
            const wish = wishes[idx];

            setTimeout(() => {
                document.getElementById('shaken-text').textContent = `"${wish.text}"`;
                document.getElementById('shaken-date').textContent = `许愿于 ${wish.date}`;
                const el = document.getElementById('shaken-wish');
                el.classList.remove('show');
                void el.offsetWidth;
                el.classList.add('show');
            }, 600);
        }

        function markDone() {
            if (currentShaken === null) return;
            const wishes = getWishes();
            const wish = wishes.splice(currentShaken, 1)[0];
            saveWishes(wishes);

            const done = getDone();
            done.push(wish);
            saveDone(done);

            currentShaken = null;
            document.getElementById('shaken-wish').classList.remove('show');
            updateBottle();
            renderDone();
        }

        function renderDone() {
            const done = getDone();
            const section = document.getElementById('done-section');
            if (done.length === 0) { section.innerHTML = ''; return; }

            let html = '<div class="done-title">已 实 现 的 愿 望 ✨</div>';
            done.forEach(w => {
                html += `<div class="done-wish">⭐ ${w.text}（${w.date}）</div>`;
            });
            section.innerHTML = html;
        }

        updateBottle();
        renderDone();
    </script>
</body>
</html>
