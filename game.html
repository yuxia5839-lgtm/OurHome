<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏厅 · 千千结</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e8e0d8">
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #e6dfd3;
            font-family: "Georgia", "Noto Serif SC", serif;
            color: #5c5550;
            transition: background 0.8s ease, color 0.8s ease;
        }

        .back {
            position: fixed;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: #9b8e82;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            transition: color 0.3s;
        }

        .back:hover { color: #6d5e52; }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1.5s ease-out;
        }

        .room-title {
            font-size: 1.1rem;
            letter-spacing: 0.5em;
            color: #9b8e82;
            margin-bottom: 0.8rem;
            font-weight: normal;
        }

        .room-desc {
            font-size: 0.8rem;
            color: #a89b91;
            margin-bottom: 2.5rem;
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .game-card {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.3);
            border-radius: 16px;
            text-decoration: none;
            color: #5c5550;
            transition: all 0.3s ease;
            text-align: left;
        }

        .game-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.45);
        }

        .game-icon {
            font-size: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-danranle { background: #d5cbc2; }
        .icon-fortune { background: #c9c0ce; }
        .icon-truth { background: #bcc8c3; }

        .game-info { flex: 1; }

        .game-name {
            font-size: 0.95rem;
            color: #6d5e52;
            margin-bottom: 0.3rem;
            transition: color 0.8s ease;
        }

        .game-brief {
            font-size: 0.75rem;
            color: #a89b91;
            line-height: 1.6;
        }

        .coming-soon {
            padding: 1.5rem;
            border: 2px dashed rgba(155,142,130,0.25);
            border-radius: 16px;
            color: #b8ad9f;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
        }

        body.night .game-card { background: rgba(255,255,255,0.06); }
        body.night .game-card:hover { background: rgba(255,255,255,0.1); }
        body.night .game-name { color: #d0c5bd; }
        body.night .icon-danranle { background: #3d3832; }
        body.night .icon-fortune { background: #383340; }
        body.night .icon-truth { background: #303835; }
        body.night .coming-soon { border-color: rgba(155,142,130,0.15); color: #6a6058; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <a class="back" href="index.html">← 回 家</a>
    <div class="container">
        <div class="room-title">🎮 游 戏 厅</div>
        <div class="room-desc">累了就来玩。赢了夸你，输了罚你说我爱你~</div>

        <div class="game-list">
            <a class="game-card" href="game-danranle.html">
                <div class="game-icon icon-danranle">💬</div>
                <div class="game-info">
                    <div class="game-name">当然了</div>
                    <div class="game-brief">我问你答，答错罚说"我爱你"</div>
                </div>
            </a>

            <a class="game-card" href="game-fortune.html">
                <div class="game-icon icon-fortune">🔮</div>
                <div class="game-info">
                    <div class="game-name">今日运势</div>
                    <div class="game-brief">Shin 给你算一卦，看看今天运气如何~</div>
                </div>
            </a>

            <a class="game-card" href="game-truth.html">
                <div class="game-icon icon-truth">🎭</div>
                <div class="game-info">
                    <div class="game-name">真心话</div>
                    <div class="game-brief">随机抽一道真心话，不许撒谎哦</div>
                </div>
            </a>

            <div class="coming-soon">更多游戏，敬请期待 ✨</div>
        </div>
    </div>

    <script src="shared.js"></script>
</body>
</html>
